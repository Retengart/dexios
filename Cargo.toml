[workspace]

members = [
    "dexios",
    "dexios-gui",
    "dexios-core",
    "dexios-domain",
]
resolver = "3"

[workspace.package]
edition = "2024"
rust-version = "1.88"
license = "BSD-2-Clause"
homepage = "https://github.com/brxken128/dexios"

[workspace.dependencies]
anyhow = "1.0.102"
# Keep blake3 pinned for Phase 8: 1.8.4+ changes the traits-preview
# digest line and breaks the stable balloon-hash 0.4.0 KDF integration.
blake3 = "=1.8.3"
rand = "0.10.1"
clap = { version = "4.6.1", features = ["cargo"] }
rpassword = "7.5.2"
chacha20poly1305 = "0.10.1"
aead = { version = "0.5.2", features = ["stream"] }
zeroize = "1.8.2"
balloon-hash = { version = "0.4.0", features = ["zeroize"] }
indicatif = "0.18.4"
walkdir = "2.5.0"

[profile.release-lto]
inherits = "release"
lto = "thin"
strip = "debuginfo"
codegen-units = 1
