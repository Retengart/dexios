[workspace]

members = [
    "dexios",
    "dexios-gui",
    "dexios-core",
    "dexios-domain",
]
resolver = "2"

[workspace.package]
edition = "2021"
rust-version = "1.93"
license = "BSD-2-Clause"
homepage = "https://github.com/brxken128/dexios"

[workspace.dependencies]
anyhow = "1.0.102"
blake3 = "1.8.3"
rand = "0.8.5"
clap = { version = "4.5.60", features = ["cargo"] }
rpassword = "7.4.0"
zip = { version = "0.6.3", default-features = false, features = ["zstd"] }
aes-gcm = "0.10.3"
chacha20poly1305 = "0.10.1"
deoxys = "0.1.0"
aead = { version = "0.5.2", features = ["stream"] }
zeroize = "1.8.2"
argon2 = "0.4.1"
balloon-hash = "0.3.0"
indicatif = "0.16.2"
walkdir = "2.5.0"
