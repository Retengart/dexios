[workspace]

members = [
    "dexios",
    "dexios-gui",
    "dexios-core",
    "dexios-domain",
]
resolver = "3"

[workspace.package]
edition = "2024"
rust-version = "1.88"
license = "BSD-2-Clause"
homepage = "https://github.com/brxken128/dexios"

[workspace.dependencies]
anyhow = "1.0.102"
blake3 = "1.8.3"
rand = "0.10.0"
clap = { version = "4.5.60", features = ["cargo"] }
rpassword = "7.4.0"
zip = { version = "8.2.0", default-features = false, features = ["zstd"] }
aes-gcm = "0.10.3"
chacha20poly1305 = "0.10.1"
deoxys = "0.1.0"
aead = { version = "0.5.2", features = ["stream"] }
zeroize = "1.8.2"
argon2 = "0.5.3"
balloon-hash = "0.4.0"
indicatif = "0.18.4"
walkdir = "2.5.0"
