version: 2
updates:
  - package-ecosystem: "cargo" # See documentation for possible values
    directory: "/" # Location of package manifests
    schedule:
      interval: "weekly"
    # Batch updates into grouped PRs instead of one PR per dependency.
    # See: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file#groups
    groups:
      cargo-security:
        applies-to: security-updates
        patterns:
          - "*"
      cargo-version:
        applies-to: version-updates
        patterns:
          - "*"
