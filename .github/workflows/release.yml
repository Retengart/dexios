name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  validate_tag:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Enforce full semver tag
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Ref '$GITHUB_REF_NAME' is not a full semver release tag." >&2
            exit 1
          fi

      - name: Verify tag matches dexios crate version
        shell: bash
        run: |
          crate_version="$(
            awk -F '"' '
              /^\[package\]$/ { in_package = 1; next }
              /^\[/ { in_package = 0 }
              in_package && /^version = "/ { print $2; exit }
            ' dexios/Cargo.toml
          )"

          if [[ -z "$crate_version" ]]; then
            echo "Could not determine package.version from dexios/Cargo.toml." >&2
            exit 1
          fi

          expected_tag="v${crate_version}"
          if [[ "$GITHUB_REF_NAME" != "$expected_tag" ]]; then
            echo "Release tag '$GITHUB_REF_NAME' does not match dexios/Cargo.toml version '$crate_version' (expected '$expected_tag')." >&2
            exit 1
          fi

  build:
    needs: validate_tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rust: stable
            binary_path: target/release-lto/dexios
            asset_suffix: linux-amd64
            asset_ext: ""
            artifact_name: dexios-linux-amd64
          - os: macos-15-intel
            rust: stable
            binary_path: target/release-lto/dexios
            asset_suffix: macos-amd64
            asset_ext: ""
            artifact_name: dexios-macos-amd64
          - os: windows-latest
            rust: stable
            binary_path: target/release-lto/dexios.exe
            asset_suffix: windows-amd64
            asset_ext: ".exe"
            artifact_name: dexios-windows-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        run: rustup toolchain install ${{ matrix.rust }} --profile minimal

      - name: Select Rust toolchain
        run: rustup default ${{ matrix.rust }}

      - name: Build dexios release binary
        run: cargo build --profile release-lto -p dexios

      - name: Rename release asset
        shell: bash
        run: |
          asset_name="dexios-${GITHUB_REF_NAME}-${{ matrix.asset_suffix }}${{ matrix.asset_ext }}"
          mkdir -p release-assets
          mv "${{ matrix.binary_path }}" "release-assets/${asset_name}"

      - name: Generate Linux checksum
        if: runner.os == 'Linux'
        shell: bash
        run: |
          asset_name="dexios-${GITHUB_REF_NAME}-${{ matrix.asset_suffix }}${{ matrix.asset_ext }}"
          cd release-assets
          sha256sum "$asset_name" > "$asset_name.sha256"

      - name: Generate macOS checksum
        if: runner.os == 'macOS'
        shell: bash
        run: |
          asset_name="dexios-${GITHUB_REF_NAME}-${{ matrix.asset_suffix }}${{ matrix.asset_ext }}"
          cd release-assets
          shasum -a 256 "$asset_name" > "$asset_name.sha256"

      - name: Generate Windows checksum
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $assetName = "dexios-${env:GITHUB_REF_NAME}-${{ matrix.asset_suffix }}${{ matrix.asset_ext }}"
          $assetPath = Join-Path "release-assets" $assetName
          $checksumPath = Join-Path "release-assets" "$assetName.sha256"
          $hash = (Get-FileHash -Algorithm SHA256 $assetPath).Hash.ToLowerInvariant()
          $checksum = "{0}  {1}`n" -f $hash, $assetName
          [System.IO.File]::WriteAllText($checksumPath, $checksum, [System.Text.Encoding]::ASCII)

      - name: Upload release assets
        uses: actions/upload-artifact@v7.0.0
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            release-assets/dexios-${{ github.ref_name }}-${{ matrix.asset_suffix }}${{ matrix.asset_ext }}
            release-assets/dexios-${{ github.ref_name }}-${{ matrix.asset_suffix }}${{ matrix.asset_ext }}.sha256
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8.0.0
        with:
          path: release-assets

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          mapfile -t files < <(find release-assets -type f | sort)
          test "${#files[@]}" -gt 0

          declare -A expected_files=()
          for file in "${files[@]}"; do
            asset_name="$(basename "$file")"
            expected_files["$asset_name"]="$file"
          done

          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            declare -A existing_assets=()
            unexpected_assets=()

            while IFS= read -r asset_name; do
              [[ -n "$asset_name" ]] || continue
              existing_assets["$asset_name"]=1
              if [[ -z "${expected_files[$asset_name]:-}" ]]; then
                unexpected_assets+=("$asset_name")
              fi
            done < <(
              gh api "repos/$GITHUB_REPOSITORY/releases/tags/$GITHUB_REF_NAME" \
                --jq '.assets[].name'
            )

            if [[ "${#unexpected_assets[@]}" -gt 0 ]]; then
              {
                echo "Existing release '$GITHUB_REF_NAME' contains unexpected asset names that are not part of this run:"
                printf '  - %s\n' "${unexpected_assets[@]}"
                echo "Manual cleanup required: remove the unexpected release assets and retry the workflow."
              } >&2
              exit 1
            fi

            missing_files=()
            for file in "${files[@]}"; do
              asset_name="$(basename "$file")"
              if [[ -z "${existing_assets[$asset_name]:-}" ]]; then
                missing_files+=("$file")
              fi
            done

            if [[ "${#missing_files[@]}" -gt 0 ]]; then
              gh release upload "$GITHUB_REF_NAME" "${missing_files[@]}" \
                --repo "$GITHUB_REPOSITORY"
            fi
          else
            gh release create "$GITHUB_REF_NAME" "${files[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
