name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  validate_tag:
    runs-on: ubuntu-latest

    steps:
      # actions/checkout v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Enforce full semver tag
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Ref '$GITHUB_REF_NAME' is not a full semver release tag." >&2
            exit 1
          fi

      - name: Verify tag matches dexios crate version
        shell: bash
        run: |
          crate_version="$(
            awk -F '"' '
              /^\[package\]$/ { in_package = 1; next }
              /^\[/ { in_package = 0 }
              in_package && /^version = "/ { print $2; exit }
            ' dexios/Cargo.toml
          )"

          if [[ -z "$crate_version" ]]; then
            echo "Could not determine package.version from dexios/Cargo.toml." >&2
            exit 1
          fi

          expected_tag="v${crate_version}"
          if [[ "$GITHUB_REF_NAME" != "$expected_tag" ]]; then
            echo "Release tag '$GITHUB_REF_NAME' does not match dexios/Cargo.toml version '$crate_version' (expected '$expected_tag')." >&2
            exit 1
          fi

  maintainer_gate:
    needs: validate_tag
    runs-on: ubuntu-latest

    steps:
      # actions/checkout v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --component clippy

      - name: Select Rust toolchain
        run: rustup default stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --version 0.22.1

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --version 0.19.6

      - name: Install mdBook
        run: cargo install mdbook --locked --version 0.5.3

      - name: Run maintainer verification gate
        run: bash scripts/verify_phase_gate.sh

  build:
    needs: maintainer_gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rust: stable
            binary_path: target/release/dexios
            asset_suffix: linux-amd64
            asset_ext: ""
            artifact_name: dexios-linux-amd64
          - os: macos-15-intel
            rust: stable
            binary_path: target/release/dexios
            asset_suffix: macos-amd64
            asset_ext: ""
            artifact_name: dexios-macos-amd64
          - os: windows-latest
            rust: stable
            binary_path: target/release/dexios.exe
            asset_suffix: windows-amd64
            asset_ext: ".exe"
            artifact_name: dexios-windows-amd64

    runs-on: ${{ matrix.os }}

    steps:
      # actions/checkout v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup toolchain install ${{ matrix.rust }} --profile minimal

      - name: Select Rust toolchain
        run: rustup default ${{ matrix.rust }}

      - name: Install cargo-auditable
        run: cargo install cargo-auditable --locked --version 0.6.7

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked --version 0.5.7

      - name: Build dexios release binary
        run: cargo auditable build --locked --profile release -p dexios

      - name: Generate CycloneDX SBOM
        shell: bash
        run: |
          sbom_name="dexios-${GITHUB_REF_NAME}-${{ matrix.asset_suffix }}.cdx.json"
          mkdir -p release-assets
          cargo cyclonedx --locked --format json --spec-version 1.5 -p dexios
          # cargo-cyclonedx writes the SBOM next to the package manifest; the
          # filename is derived from the crate name (dexios.cdx.json) or, on
          # older releases, bom.json. Accept whichever it produced.
          src_sbom=""
          for candidate in dexios/dexios.cdx.json dexios/bom.json; do
            if [[ -f "$candidate" ]]; then
              src_sbom="$candidate"
              break
            fi
          done
          if [[ -z "$src_sbom" ]]; then
            src_sbom="$(find dexios -maxdepth 2 \( -name '*.cdx.json' -o -name 'bom.json' \) | head -1)"
          fi
          if [[ -z "$src_sbom" ]]; then
            echo "Could not locate generated CycloneDX SBOM." >&2
            exit 1
          fi
          mv "$src_sbom" "release-assets/${sbom_name}"

      - name: Rename release asset
        shell: bash
        run: |
          asset_name="dexios-${GITHUB_REF_NAME}-${{ matrix.asset_suffix }}${{ matrix.asset_ext }}"
          mkdir -p release-assets
          mv "${{ matrix.binary_path }}" "release-assets/${asset_name}"

      - name: Upload release assets
        # actions/upload-artifact v7.0.0
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            release-assets/dexios-${{ github.ref_name }}-${{ matrix.asset_suffix }}${{ matrix.asset_ext }}
            release-assets/dexios-${{ github.ref_name }}-${{ matrix.asset_suffix }}.cdx.json
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      # actions/download-artifact v8.0.0
      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3
        with:
          path: release-assets

      - name: Validate release assets
        shell: bash
        run: |
          expected_names=(
            "dexios-${GITHUB_REF_NAME}-linux-amd64"
            "dexios-${GITHUB_REF_NAME}-linux-amd64.cdx.json"
            "dexios-${GITHUB_REF_NAME}-linux-amd64.sigstore.json"
            "dexios-${GITHUB_REF_NAME}-linux-amd64.cdx.json.sigstore.json"
            "dexios-${GITHUB_REF_NAME}-macos-amd64"
            "dexios-${GITHUB_REF_NAME}-macos-amd64.cdx.json"
            "dexios-${GITHUB_REF_NAME}-macos-amd64.sigstore.json"
            "dexios-${GITHUB_REF_NAME}-macos-amd64.cdx.json.sigstore.json"
            "dexios-${GITHUB_REF_NAME}-windows-amd64.exe"
            "dexios-${GITHUB_REF_NAME}-windows-amd64.exe.cdx.json"
            "dexios-${GITHUB_REF_NAME}-windows-amd64.exe.sigstore.json"
            "dexios-${GITHUB_REF_NAME}-windows-amd64.exe.cdx.json.sigstore.json"
          )

          for name in "${expected_names[@]}"; do
            found="$(find release-assets -name "$name" | head -1)"
            if [[ -z "$found" ]]; then
              echo "Missing expected release asset: $name" >&2
              exit 1
            fi
          done

      - name: Attest build provenance
        # actions/attest v4.1.0
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: |
            release-assets/dexios-linux-amd64/dexios-${{ github.ref_name }}-linux-amd64
            release-assets/dexios-linux-amd64/dexios-${{ github.ref_name }}-linux-amd64.cdx.json
            release-assets/dexios-macos-amd64/dexios-${{ github.ref_name }}-macos-amd64
            release-assets/dexios-macos-amd64/dexios-${{ github.ref_name }}-macos-amd64.cdx.json
            release-assets/dexios-windows-amd64/dexios-${{ github.ref_name }}-windows-amd64.exe
            release-assets/dexios-windows-amd64/dexios-${{ github.ref_name }}-windows-amd64.exe.cdx.json

      - name: Attest Linux SBOM
        # actions/attest v4.1.0
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: 'release-assets/dexios-linux-amd64/dexios-${{ github.ref_name }}-linux-amd64'
          sbom-path: 'release-assets/dexios-linux-amd64/dexios-${{ github.ref_name }}-linux-amd64.cdx.json'

      - name: Attest macOS SBOM
        # actions/attest v4.1.0
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: 'release-assets/dexios-macos-amd64/dexios-${{ github.ref_name }}-macos-amd64'
          sbom-path: 'release-assets/dexios-macos-amd64/dexios-${{ github.ref_name }}-macos-amd64.cdx.json'

      - name: Attest Windows SBOM
        # actions/attest v4.1.0
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: 'release-assets/dexios-windows-amd64/dexios-${{ github.ref_name }}-windows-amd64.exe'
          sbom-path: 'release-assets/dexios-windows-amd64/dexios-${{ github.ref_name }}-windows-amd64.exe.cdx.json'

      - name: Sign and attest artifacts
        uses: ./.github/actions/sign-and-attest
        with:
          paths: |
            release-assets/dexios-linux-amd64/dexios-${{ github.ref_name }}-linux-amd64
            release-assets/dexios-linux-amd64/dexios-${{ github.ref_name }}-linux-amd64.cdx.json
            release-assets/dexios-macos-amd64/dexios-${{ github.ref_name }}-macos-amd64
            release-assets/dexios-macos-amd64/dexios-${{ github.ref_name }}-macos-amd64.cdx.json
            release-assets/dexios-windows-amd64/dexios-${{ github.ref_name }}-windows-amd64.exe
            release-assets/dexios-windows-amd64/dexios-${{ github.ref_name }}-windows-amd64.exe.cdx.json

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          mapfile -t files < <(find release-assets -type f | sort)

          declare -A expected_files=()
          for file in "${files[@]}"; do
            asset_name="$(basename "$file")"
            expected_files["$asset_name"]="$file"
          done

          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            declare -A existing_assets=()
            unexpected_assets=()
            duplicate_assets=()

            while IFS= read -r asset_name; do
              [[ -n "$asset_name" ]] || continue
              existing_assets["$asset_name"]=1
              if [[ -z "${expected_files[$asset_name]:-}" ]]; then
                unexpected_assets+=("$asset_name")
              fi
            done < <(
              gh api "repos/$GITHUB_REPOSITORY/releases/tags/$GITHUB_REF_NAME" \
                --jq '.assets[].name'
            )

            if [[ "${#unexpected_assets[@]}" -gt 0 ]]; then
              {
                echo "Existing release '$GITHUB_REF_NAME' contains unexpected asset names that are not part of this run:"
                printf '  - %s\n' "${unexpected_assets[@]}"
                echo "Manual cleanup required: remove the unexpected release assets and retry the workflow."
              } >&2
              exit 1
            fi

            for file in "${files[@]}"; do
              asset_name="$(basename "$file")"
              if [[ -n "${existing_assets[$asset_name]:-}" ]]; then
                duplicate_assets+=("$asset_name")
              fi
            done

            if [[ "${#duplicate_assets[@]}" -gt 0 ]]; then
              {
                echo "Existing release '$GITHUB_REF_NAME' already contains asset names from this run:"
                printf '  - %s\n' "${duplicate_assets[@]}"
                echo "Manual cleanup required: remove existing release assets before retrying."
              } >&2
              exit 1
            fi

            gh release upload "$GITHUB_REF_NAME" "${files[@]}" \
              --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$GITHUB_REF_NAME" "${files[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --notes-file <(bash scripts/gen-release-body.sh "${GITHUB_REF_NAME#v}")
          fi
