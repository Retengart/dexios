name: Documentation

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Select Rust toolchain
        run: rustup default stable

      - name: Install mdBook
        run: cargo install mdbook --locked

      - name: Build documentation
        run: mdbook build

      - name: Verify repository hygiene
        run: bash scripts/verify_repo_hygiene.sh

      - name: Verify generated docs are current
        run: |
          git diff --exit-code -- docs
          docs_status="$(git status --porcelain --untracked-files=all -- docs)"
          if [ -n "$docs_status" ]; then
            printf '%s\n' "$docs_status" >&2
            exit 1
          fi
