# A routine check to see if there are any Rust-specific security vulnerabilities 
# in the repo we should be aware of.

name: audit
on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 0 * * 1" # every Monday

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal
      - name: Select Rust toolchain
        run: rustup default stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --version 0.22.1
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --version 0.19.6
      - name: Run cargo-audit
        run: cargo audit --deny warnings
      - name: Run cargo-deny
        run: cargo deny check
