name: Build and Upload

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    branches: [ master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  clippy:
    name: clippy (ubuntu-latest, stable)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6.0.2

    - name: Install Rust toolchain
      run: rustup toolchain install stable --profile minimal --component clippy

    - name: Select Rust toolchain
      run: rustup default stable

    - name: Restore cargo cache
      uses: actions/cache@v5.0.3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-stable-${{ hashFiles('Cargo.lock') }}

    - name: Clippy
      run: cargo +stable clippy --workspace --all-targets --all-features --no-deps

  check:
    name: check (ubuntu-latest, stable)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6.0.2

    - name: Install Rust toolchain
      run: rustup toolchain install stable --profile minimal

    - name: Select Rust toolchain
      run: rustup default stable

    - name: Restore cargo cache
      uses: actions/cache@v5.0.3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-stable-${{ hashFiles('Cargo.lock') }}

    - name: Check
      run: cargo +stable check --workspace --all-targets --release

  build:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        rust:
          - stable

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        run: rustup toolchain install ${{ matrix.rust }} --profile minimal

      - name: Select Rust toolchain
        run: rustup default ${{ matrix.rust }}

      - name: Restore cargo cache
        uses: actions/cache@v5.0.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.os }}-cargo-${{ matrix.rust }}-${{ hashFiles('Cargo.lock') }}

      - name: Build
        run: cargo +${{ matrix.rust }} build --release

      - if: matrix.os != 'windows-latest'
        name: Strip
        run: strip target/release/dexios

      - if: matrix.os == 'ubuntu-latest'
        name: Hash the Binary
        run: sha256sum target/release/dexios

      - if: matrix.os == 'ubuntu-latest'
        name: Upload Binary as artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: dexios-linux-amd64
          path: target/release/dexios
      - if: matrix.os == 'macos-latest'
        name: Upload Binary as artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: dexios-macos-amd64
          path: target/release/dexios
      - if: matrix.os == 'windows-latest'
        name: Upload Binary as artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: dexios-windows-amd64
          path: target/release/dexios.exe
