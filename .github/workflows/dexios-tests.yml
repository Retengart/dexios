name: Dexios Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  DEXIOS_BIN: ${{ github.workspace }}/target/release/dexios

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false
    - name: Install Rust toolchain
      run: rustup toolchain install stable --profile minimal
    - name: Select Rust toolchain
      run: rustup default stable
    - name: Restore cargo cache
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-stable-${{ hashFiles('Cargo.lock') }}
    - name: Build
      run: cargo build --locked --release -p dexios
    - name: Strip
      run: strip target/release/dexios
    - name: Upload Binary as artifact
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
      with:
        name: dexios
        path: target/release/dexios
        retention-days: 1

  stream-mode:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false
    - name: Retrieve Dexios
      uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3
      with:
        name: dexios
        path: target/release
    - name: Make Binary Executable
      run: |
        test -f "$DEXIOS_BIN"
        chmod +x "$DEXIOS_BIN"
    - name: Generate test file
      run: dd if=/dev/urandom of=100MB.bin bs=1M count=100
    - name: Generate keyfile
      run: dd if=/dev/urandom of=keyfile bs=1 count=4096
    - name: Save plaintext hash
      run: sha256sum 100MB.bin > 100MB.bin.sha256
    - name: Encrypt in stream mode (XChaCha20-Poly1305)
      run: '"$DEXIOS_BIN" -eHfk keyfile 100MB.bin 100MB.enc'
    - name: Decrypt in stream mode (XChaCha20-Poly1305)
      run: '"$DEXIOS_BIN" -dHfk keyfile 100MB.enc 100MB.bin'
    - name: Verify decrypted plaintext (XChaCha20-Poly1305)
      run: sha256sum -c 100MB.bin.sha256

  header-tests:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false
    - name: Retrieve Dexios
      uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3
      with:
        name: dexios
        path: target/release
    - name: Make Binary Executable
      run: |
        test -f "$DEXIOS_BIN"
        chmod +x "$DEXIOS_BIN"
    - name: Generate test file
      run: dd if=/dev/urandom of=100MB.bin bs=1M count=100
    - name: Generate keyfile
      run: dd if=/dev/urandom of=keyfile bs=1 count=4096
    - name: Save plaintext hash
      run: sha256sum 100MB.bin > 100MB.bin.sha256
    - name: Encrypt in stream mode (XChaCha20-Poly1305)
      run: '"$DEXIOS_BIN" -eHfk keyfile 100MB.bin 100MB.enc'
    - name: Dump Header
      run: '"$DEXIOS_BIN" header dump 100MB.enc 100MB.enc.header'
    - name: Strip Header
      run: '"$DEXIOS_BIN" header strip -f --header 100MB.enc.header 100MB.enc'
    - name: Restore Header
      run: '"$DEXIOS_BIN" header restore -f 100MB.enc.header 100MB.enc'
    - name: Decrypt in stream mode (XChaCha20-Poly1305)
      run: '"$DEXIOS_BIN" -dHfk keyfile 100MB.enc 100MB.bin'
    - name: Verify restored-header plaintext
      run: sha256sum -c 100MB.bin.sha256
    - name: Strip Header
      run: '"$DEXIOS_BIN" header strip -f --header 100MB.enc.header 100MB.enc'
    - name: Decrypt in stream mode with detached header (XChaCha20-Poly1305)
      run: '"$DEXIOS_BIN" -dHfk keyfile --header 100MB.enc.header 100MB.enc 100MB.bin'
    - name: Verify detached-header plaintext
      run: sha256sum -c 100MB.bin.sha256
    - name: Save plaintext hash for detached-header encrypt
      run: sha256sum 100MB.bin > 100MB.detached.sha256
    - name: Encrypt in stream mode to detached header (XChaCha20-Poly1305)
      run: '"$DEXIOS_BIN" -eHfk keyfile --header 100MB.header 100MB.bin 100MB.enc'
    - name: Decrypt in stream mode with detached header (XChaCha20-Poly1305)
      run: '"$DEXIOS_BIN" -dHfk keyfile --header 100MB.header 100MB.enc 100MB.bin'
    - name: Verify detached-header roundtrip plaintext
      run: sha256sum -c 100MB.detached.sha256

  hash-standalone-mode:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false
    - name: Retrieve Dexios
      uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3
      with:
        name: dexios
        path: target/release
    - name: Make Binary Executable
      run: |
        test -f "$DEXIOS_BIN"
        chmod +x "$DEXIOS_BIN"
    - name: Install b3sum
      run: |
        sudo apt-get update
        sudo apt-get install -y b3sum
    - name: Generate test file
      run: dd if=/dev/urandom of=100MB.bin bs=1M count=100
    - name: Generate keyfile
      run: dd if=/dev/urandom of=keyfile bs=1 count=4096
    - name: Encrypt in stream mode (XChaCha20-Poly1305)
      run: '"$DEXIOS_BIN" -eHfk keyfile 100MB.bin 100MB.enc'
    - name: Decrypt in stream mode (XChaCha20-Poly1305)
      run: '"$DEXIOS_BIN" -dHfk keyfile 100MB.enc 100MB.bin'
    - name: Verify standalone hash output
      run: |
        expected_hash="$(b3sum 100MB.enc | awk '{print $1}')"
        actual_hash="$("$DEXIOS_BIN" hash 100MB.enc | awk 'END { print $3 }')"
        test "$actual_hash" = "$expected_hash"

  delete-after-success:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false
    - name: Retrieve Dexios
      uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3
      with:
        name: dexios
        path: target/release
    - name: Make Binary Executable
      run: |
        test -f "$DEXIOS_BIN"
        chmod +x "$DEXIOS_BIN"
    - name: Generate stream fixture
      run: |
        printf 'delete-after-success stream\n' > stream.txt
        printf '12345678' > smoke.key
    - name: Encrypt and delete plaintext input
      run: |
        "$DEXIOS_BIN" encrypt -f -k smoke.key --delete-input stream.txt stream.enc
        test ! -e stream.txt
        test -f stream.enc
    - name: Decrypt and delete encrypted input
      run: |
        "$DEXIOS_BIN" decrypt -f -k smoke.key --delete-input stream.enc stream.out
        test ! -e stream.enc
        grep -F 'delete-after-success stream' stream.out
    - name: Generate pack fixture
      run: |
        mkdir -p pack-src/nested pack-out
        printf 'delete-after-success pack\n' > pack-src/nested/file.txt
    - name: Pack and delete source directory
      run: |
        "$DEXIOS_BIN" pack -f -k smoke.key --delete-source pack-src archive.enc
        test ! -e pack-src
        test -f archive.enc
    - name: Unpack and delete archive input
      run: |
        "$DEXIOS_BIN" unpack -f -k smoke.key --delete-input archive.enc pack-out
        test ! -e archive.enc
        grep -F 'delete-after-success pack' pack-out/pack-src/nested/file.txt

  medium-file-smoke:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false
    - name: Retrieve Dexios
      uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3
      with:
        name: dexios
        path: target/release
    - name: Make Binary Executable
      run: |
        test -f "$DEXIOS_BIN"
        chmod +x "$DEXIOS_BIN"
    - name: Generate test file
      run: dd if=/dev/urandom of=32MB.bin bs=1M count=32
    - name: Generate keyfile
      run: dd if=/dev/urandom of=keyfile bs=1 count=4096
    - name: Save plaintext hash (XChaCha20-Poly1305)
      run: sha256sum 32MB.bin > 32MB.bin.sha256
    - name: Encrypt medium file (XChaCha20-Poly1305)
      run: '"$DEXIOS_BIN" -eHfk keyfile 32MB.bin 32MB.enc'
    - name: Decrypt medium file (XChaCha20-Poly1305)
      run: '"$DEXIOS_BIN" -dHfk keyfile 32MB.enc 32MB.bin'
    - name: Verify decrypted medium plaintext (XChaCha20-Poly1305)
      run: sha256sum -c 32MB.bin.sha256

  small-file:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Retrieve Dexios
      uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3
      with:
        name: dexios
        path: target/release
    - name: Make Binary Executable
      run: |
        test -f "$DEXIOS_BIN"
        chmod +x "$DEXIOS_BIN"
    - name: Generate test file
      run: dd if=/dev/urandom of=1KB.bin bs=1 count=1024
    - name: Generate keyfile
      run: dd if=/dev/urandom of=keyfile bs=1 count=4096
    - name: Save plaintext hash (XChaCha20-Poly1305)
      run: sha256sum 1KB.bin > 1KB.bin.sha256
    - name: Encrypt 1KB file (XChaCha20-Poly1305)
      run: '"$DEXIOS_BIN" -eHfk keyfile 1KB.bin 1KB.enc'
    - name: Decrypt 1KB file (XChaCha20-Poly1305)
      run: '"$DEXIOS_BIN" -dHfk keyfile 1KB.enc 1KB.bin'
    - name: Verify decrypted 1KB plaintext (XChaCha20-Poly1305)
      run: sha256sum -c 1KB.bin.sha256

  pack:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false
    - name: Retrieve Dexios
      uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3
      with:
        name: dexios
        path: target/release
    - name: Make Binary Executable
      run: |
        test -f "$DEXIOS_BIN"
        chmod +x "$DEXIOS_BIN"
    - name: Make Directory
      run: mkdir test
    - name: Generate test files
      run: dd if=/dev/urandom of=test/1.bin bs=1M count=10 && dd if=/dev/urandom of=test/2.bin bs=1M count=10 && dd if=/dev/urandom of=test/3.bin bs=1M count=10 && dd if=/dev/urandom of=test/4.bin bs=1M count=10
    - name: Generate keyfile
      run: dd if=/dev/urandom of=keyfile bs=1 count=4096
    - name: Save source manifest
      run: find test -type f -print0 | sort -z | xargs -0 sha256sum > test.manifest
    - name: Pack+Encrypt test directory (XChaCha20-Poly1305)
      run: '"$DEXIOS_BIN" pack -fk keyfile test/ output.dexios'
    - name: Remove Directory
      run: rm -rf test/
    - name: Decrypt+Unpack archive (XChaCha20-Poly1305)
      run: '"$DEXIOS_BIN" unpack -fk keyfile output.dexios .'
    - name: Save unpacked manifest
      run: find test -type f -print0 | sort -z | xargs -0 sha256sum > test.after.manifest
    - name: Verify unpacked files
      run: diff -u test.manifest test.after.manifest

  key-verify:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false
    - name: Retrieve Dexios
      uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3
      with:
        name: dexios
        path: target/release
    - name: Make Binary Executable
      run: |
        test -f "$DEXIOS_BIN"
        chmod +x "$DEXIOS_BIN"
    - name: Generate test file
      run: dd if=/dev/urandom of=100MB.bin bs=1M count=100
    - name: Generate keyfile
      run: dd if=/dev/urandom of=keyfile bs=1 count=4096
    - name: Generate wrong keyfile
      run: dd if=/dev/urandom of=wrong-keyfile bs=1 count=4096
    - name: Encrypt in stream mode (XChaCha20-Poly1305)
      run: '"$DEXIOS_BIN" -eHfk keyfile 100MB.bin 100MB.enc'
    - name: Verify correct key
      run: '"$DEXIOS_BIN" key verify -k keyfile 100MB.enc'
    - name: Reject incorrect key
      run: |
        if "$DEXIOS_BIN" key verify -k wrong-keyfile 100MB.enc; then
          echo "wrong key unexpectedly verified" >&2
          exit 1
        fi
    - name: Show header details
      run: '"$DEXIOS_BIN" header details 100MB.enc'

  key-change:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false
    - name: Retrieve Dexios
      uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3
      with:
        name: dexios
        path: target/release
    - name: Make Binary Executable
      run: chmod +x "$DEXIOS_BIN"
    - name: Generate test file
      run: dd if=/dev/urandom of=100MB.bin bs=1M count=100
    - name: Generate keyfile
      run: dd if=/dev/urandom of=keyfile bs=1 count=4096
    - name: Generate keyfile for test
      run: dd if=/dev/urandom of=keyfile-new bs=1 count=4096
    - name: Save plaintext hash
      run: sha256sum 100MB.bin > 100MB.bin.sha256
    - name: Encrypt in stream mode (XChaCha20-Poly1305)
      run: '"$DEXIOS_BIN" -eHfk keyfile 100MB.bin 100MB.enc'
    - name: Change the key (from new keyfile)
      run: '"$DEXIOS_BIN" key change -f -k keyfile -n keyfile-new 100MB.enc'
    - name: Decrypt in stream mode with changed key (XChaCha20-Poly1305)
      run: '"$DEXIOS_BIN" -dHfk keyfile-new 100MB.enc 100MB.bin'
    - name: Verify decrypted plaintext
      run: sha256sum -c 100MB.bin.sha256
    - name: Show header details
      run: '"$DEXIOS_BIN" header details 100MB.enc'
