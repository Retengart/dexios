name: CLI Surface

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  DEXIOS_BIN: ${{ github.workspace }}/target/release-lto/dexios

permissions:
  contents: read

jobs:
  cli-surface:
    name: cli-surface (ubuntu-latest, stable)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Select Rust toolchain
        run: rustup default stable

      - name: Restore cargo cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cli-surface-stable-${{ hashFiles('Cargo.lock') }}

      - name: Build release-lto dexios
        run: cargo build -p dexios --profile release-lto

      - name: Run CLI surface harness
        run: |
          mkdir -p target/cli-surface-artifacts
          KEEP_TMP=1 CLI_SURFACE_ARTIFACTS_DIR=target/cli-surface-artifacts \
            bash scripts/verify_cli_surface.sh 2>&1 | tee target/cli-surface-artifacts/cli-surface.log

      - name: Upload CLI surface artifacts
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: cli-surface-artifacts
          path: target/cli-surface-artifacts
          retention-days: 7
