# Workspace Clippy configuration (quality-3).
# MSRV gates lint suggestions to APIs stable on our minimum toolchain.
msrv = "1.88"

# Types for which `clippy::arithmetic_side_effects` is suppressed. These are the
# internal counter/index domain newtypes whose arithmetic is bounds-checked at
# their own construction sites (try_from_u8 / try_from_usize /
# try_from_physical_index), so the generic
# overflow-on-arithmetic warning is impractical and adds no real safety here.
# We deliberately do NOT blanket-allow primitive integer arithmetic: hot crypto
# and header-parsing math is fixed with checked_*/saturating_* instead.
arithmetic-side-effects-allowed = [
    "core::header::v1::V1KeyslotIndex",
    "core::header::v1::V1KeyslotCount",
]
