[graph]
all-features = true
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "x86_64-pc-windows-msvc",
]

[advisories]
unmaintained = "workspace"
unsound = "all"
ignore = []

[bans]
multiple-versions = "deny"
wildcards = "deny"
highlight = "simplest-path"
deny = []
skip = [
    { crate = "chacha20@0.9.1", reason = "Final graph keeps chacha20poly1305 0.10.1 on the RustCrypto 0.9 stream while rand 0.10.1 uses chacha20 0.10.0." },
    { crate = "cpufeatures@0.2.17", reason = "Final graph keeps stable crypto crates on cpufeatures 0.2 while rand 0.10.1 pulls chacha20 0.10 with cpufeatures 0.3." },
    { crate = "getrandom@0.2.17", reason = "Required by rand_core 0.6 through the stable RustCrypto 0.10 stack kept for the current stream AEAD/KDF contract." },
    { crate = "rand_core@0.6.4", reason = "Required by the stable RustCrypto 0.10 dependency line while rand 0.10.1 uses rand_core 0.10.1." },
    { crate = "windows-sys@0.59.0", reason = "Required by rtoolbox via rpassword 7.5.2 while newer Windows transitive dependencies use windows-sys 0.61.2." },
]
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

[licenses]
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "MIT",
]
exceptions = []
